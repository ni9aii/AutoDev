name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Least-privilege: the test job only needs to read contents to check out.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Build & Test (Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/index
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache target directory
        uses: actions/cache@v6
        with:
          path: target
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-target-

      - name: Run clippy
        run: cargo clippy --locked -- -D warnings

      - name: Run tests
        run: cargo test --locked --verbose

      - name: Build release
        run: cargo build --locked --release

      - name: Audit dependencies
        # Non-blocking: fails only on a real advisory; `cargo audit` may be
        # absent on a fresh runner, so don't hard-fail CI on its absence.
        continue-on-error: true
        run: |
          cargo install cargo-audit --locked --force || true
          cargo audit || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: autodev
          path: |
            target/release/run-pipeline
            target/release/ci-check
            target/release/review-aggregator
