name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test on Arch Linux
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install dependencies
        run: pacman -Syu --noconfirm curl base-devel

      - name: Install Rust
        run: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y

      - uses: actions/checkout@v4

      - name: Run clippy
        run: |
          . $HOME/.cargo/env
          cargo clippy -- -D warnings

      - name: Run tests
        run: |
          . $HOME/.cargo/env
          cargo test --verbose

      - name: Build release
        run: |
          . $HOME/.cargo/env
          cargo build --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: autodev-arch
          path: target/release/run-pipeline
