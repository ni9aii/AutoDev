name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test --verbose

      - name: Build release
        run: cargo build --release

  build-linux:
    name: Build on ${{ matrix.distro }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - distro: ubuntu
            image: ubuntu:24.04
            install: apt-get update && apt-get install -y curl build-essential
          - distro: fedora
            image: fedora:40
            install: dnf install -y curl gcc
          - distro: alpine
            image: alpine:3.19
            install: apk add --no-cache curl build-base
    container:
      image: ${{ matrix.image }}
    steps:
      - name: Install dependencies
        run: ${{ matrix.install }}

      - name: Install Rust
        run: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y

      - uses: actions/checkout@v4

      - name: Build
        run: |
          . $HOME/.cargo/env
          cargo build --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: autodev-${{ matrix.distro }}
          path: target/release/run-pipeline