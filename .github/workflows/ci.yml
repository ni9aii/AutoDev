name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Least-privilege: the test job only needs to read contents to check out.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/index
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache target directory
        uses: actions/cache@v6
        with:
          path: target
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-target-

      - name: Run clippy
        run: cargo clippy --locked -- -D warnings

      - name: Run tests
        run: cargo test --locked --verbose

      - name: Build release
        run: cargo build --locked --release

      - name: Audit dependencies
        # Non-blocking: fails only on a real advisory; `cargo audit` may be
        # absent on a fresh runner, so don't hard-fail CI on its absence.
        continue-on-error: true
        run: |
          cargo install cargo-audit --locked --force || true
          cargo audit || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: autodev-${{ matrix.os }}
          path: |
            target/release/run-pipeline*
            target/release/ci-check*
            target/release/review-aggregator*

  gen-check:
    name: Skill generator drift + functional check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Re-render skill surfaces
        run: bash tools/gen.sh

      - name: Fail if any rendered skill drifted from source
        run: |
          if ! git diff --exit-code -- SKILL.md skills/hermes/SKILL.md skills/claude-code/SKILL.md skills/hermes/references skills/claude-code/references; then
            echo "::error::Rendered skills drifted from SKILL.core.md/harnesses/*.overlay."
            echo "Run 'bash tools/gen.sh' locally and commit the result."
            exit 1
          fi
          echo "Skill surfaces are in sync with source."

      - name: Functional checks (generator + installer)
        run: |
          set -eu
          echo "== no unfilled placeholders =="
          if grep -rn '{{' SKILL.md skills/hermes/SKILL.md skills/claude-code/SKILL.md; then
            echo "::error::Found unfilled {{placeholder}} in rendered skill"; exit 1
          fi
          echo "== frontmatter present =="
          test "$(head -1 SKILL.md)" = '---' || { echo "::error::SKILL.md missing frontmatter"; exit 1; }
          echo "== references copied =="
          test -f skills/hermes/references/skill-walkthrough.md || { echo "::error::hermes references missing"; exit 1; }
          test -f skills/claude-code/references/skill-walkthrough.md || { echo "::error::claude-code references missing"; exit 1; }
          echo "== install.sh --list works =="
          ./install.sh --list > /tmp/il.txt 2>&1
          grep -q hermes /tmp/il.txt || { echo "::error::install.sh --list broken"; exit 1; }
          echo "== install into temp root, --check must report present (0) =="
          rm -rf /tmp/adtest
          AUTODEV_INSTALL_ROOT=/tmp/adtest ./install.sh --harness claude-code > /tmp/inst.txt 2>&1
          AUTODEV_INSTALL_ROOT=/tmp/adtest ./install.sh --harness claude-code --check > /tmp/ic.txt 2>&1 && rc=0 || rc=$?
          test "$rc" -eq 0 || { echo "::error::--check should exit 0 after install, got $rc"; exit 1; }
          echo "== --check on different (empty) root must report missing (1) =="
          AUTODEV_INSTALL_ROOT=/tmp/adtest2 ./install.sh --harness claude-code --check > /tmp/ic2.txt 2>&1 && rc=0 || rc=$?
          test "$rc" -eq 1 || { echo "::error::--check should exit 1 for missing install, got $rc"; exit 1; }
          echo "== install.sh rejects unknown harness =="
          if ./install.sh --harness nope --check > /tmp/in.txt 2>&1; then
            echo "::error::unknown harness should fail"; exit 1
          fi
          echo "All generator + installer checks passed."
