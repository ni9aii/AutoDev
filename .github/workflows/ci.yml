name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Build & Test (Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/index
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache target directory
        uses: actions/cache@v6
        with:
          path: target
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-target-

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          . $HOME/.cargo/env
          rustc --version
          cargo --version

      - name: Run clippy
        run: |
          . $HOME/.cargo/env
          cargo clippy -- -D warnings

      - name: Run tests
        run: |
          . $HOME/.cargo/env
          cargo test --verbose

      - name: Build release
        run: |
          . $HOME/.cargo/env
          cargo build --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: autodev
          path: |
            target/release/run-pipeline
            target/release/ci-check
            target/release/review-aggregator